name: test

on:
  pull_request:
  push:
    branches: [master]

jobs:
  fork-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install metaSMASH with testing extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[testing]

      - name: Run metaSMASH-specific unit tests
        run: |
          pytest --durations=3 \
            antismash/common/test/test_cpu_diagnostics.py \
            antismash/common/test/test_streaming.py \
            antismash/outputs/html/test/test_taxonomy.py \
            antismash/outputs/html/test/test_generation.py \
            antismash/config/test/test_args.py
