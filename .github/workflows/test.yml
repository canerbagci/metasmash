name: test

on:
  pull_request:
  push:
    branches: [master]

jobs:
  fork-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            setup.py
            .github/workflows/test.yml

      - name: Install metaSMASH with testing extras
        # MOODS-python publishes only an sdist; pip builds a wheel locally and
        # the actions/setup-python cache reuses it across runs. GitHub Actions
        # runners have heterogeneous CPUs (Intel/AMD, varying instruction
        # sets), so a wheel built on a runner with AVX/AVX2 SIGILLs when
        # imported on a leaner runner. Build for the x86_64 baseline so the
        # cached wheel runs on every runner.
        env:
          CFLAGS: -O2 -march=x86-64
          CXXFLAGS: -O2 -march=x86-64
        run: |
          python -m pip install --upgrade pip
          pip install -e .[testing]

      - name: Run metaSMASH-specific unit tests
        # test_executables_default requires hmmscan/diamond/prodigal on PATH — not installed on a bare runner.
        run: |
          pytest --durations=3 \
            --deselect antismash/config/test/test_args.py::TestExecutableArg::test_executables_default \
            antismash/common/test/test_cpu_diagnostics.py \
            antismash/common/test/test_streaming.py \
            antismash/outputs/html/test/test_taxonomy.py \
            antismash/outputs/html/test/test_generation.py \
            antismash/config/test/test_args.py
